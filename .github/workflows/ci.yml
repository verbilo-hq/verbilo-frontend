name: ci

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Required by Vite at build time. CI uses placeholders — the real
          # values are injected by Vercel for actual deploys.
          VITE_API_BASE: https://verbilo-backend.onrender.com
          VITE_COGNITO_USER_POOL_ID: eu-north-1_PLACEHOLDER
          VITE_COGNITO_CLIENT_ID: ci-placeholder-client-id
          VITE_AWS_REGION: eu-north-1
